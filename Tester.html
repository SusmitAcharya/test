<!DOCTYPE html>
<html>

<head>
  <title>WebP Converter Test</title>
</head>

<body>

<h2>Test Converter</h2>

<input
  type="file"
  id="imageInput"
/>

<button onclick="convertImage()">
  Convert
</button>

<hr>

<img
  id="preview"
  style="max-width:500px;"
/>

<script>

async function convertImage() {

  const file =
    document.getElementById(
      "imageInput"
    ).files[0];

  if (!file) {
    alert("Select an image");
    return;
  }

  const formData =
    new FormData();

  formData.append(
    "image",
    file
  );

  const response =
    await fetch(
      "https://sa-webp-converter.vercel.app//api/convert",
      {
        method: "POST",
        headers: {
          "x-api-key":
            "HFRBvD9ZA1wA7WLl"
        },
        body: formData
      }
    );

  if (!response.ok) {

    const error =
      await response.text();

    alert(error);

    return;
  }

  const blob =
    await response.blob();

  const url =
    URL.createObjectURL(blob);

  document
    .getElementById("preview")
    .src = url;
}

</script>

</body>
</html>
